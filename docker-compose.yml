version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: flowdraft-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowdraft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowdraft-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: flowdraft-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  init-services:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: flowdraft-init
    command: python -m scripts.wait_and_init
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/flowdraft
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: flowdraft-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/flowdraft
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      FRONTEND_URL: http://frontend:3000
    ports:
      - "8000:8000"
    depends_on:
      init-services:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: flowdraft-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: flowdraft-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/flowdraft
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      FRONTEND_URL: http://frontend:3000
    depends_on:
      init-services:
        condition: service_completed_successfully
      frontend:
        condition: service_started

volumes:
  postgres_data:
  minio_data:
